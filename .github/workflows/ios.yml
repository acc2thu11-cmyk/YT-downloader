name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -project YTDownloader.xcodeproj \
                     -scheme YTDownloader \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Create IPA Package
        run: |
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/YTDownloader.app build/Payload/
          mkdir -p build/Payload/YTDownloader.app/PlugIns
          cp -r build/Build/Products/Release-iphoneos/YTShareExtension.appex build/Payload/YTDownloader.app/PlugIns/
          cd build
          zip -r YTDownloader.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTDownloader-IPA
          path: build/YTDownloader.ipa

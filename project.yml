name: YTDownloader
options:
  bundleIdPrefix: com.antigravity
targets:
  YTDownloader:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources: 
      - path: YTDownloader
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.YTDownloader
      INFOPLIST_FILE: YTDownloader/Info.plist
  YTShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: YTShareExtension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.YTDownloader.YTShareExtension
      INFOPLIST_FILE: YTShareExtension/Info.plist
